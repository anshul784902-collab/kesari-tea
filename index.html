<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open World Browser Crime Game</title>
<style>
html,body{margin:0;overflow:hidden;background:#000;font-family:Arial}
#ui{position:fixed;top:0;left:0;color:#0f0;padding:8px;font-size:14px}
#minimap{position:fixed;right:10px;bottom:10px;width:160px;height:160px;border:2px solid #fff;background:#111}
#pause{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:40px;display:none}
</style>
</head>
<body>
<canvas id="game"></canvas>
<canvas id="minimap"></canvas>
<div id="ui"></div>
<div id="pause">PAUSED</div>

<script>
// ===== CORE SETUP =====
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const mini=document.getElementById("minimap").getContext("2d");
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();addEventListener("resize",resize);

let keys={},mouse={x:0,y:0,down:false};
onkeydown=e=>keys[e.key.toLowerCase()]=true;
onkeyup=e=>keys[e.key.toLowerCase()]=false;
onmousedown=()=>mouse.down=true; onmouseup=()=>mouse.down=false;
onmousemove=e=>{mouse.x=e.clientX;mouse.y=e.clientY}

let last=0,dt=0,paused=false;
function loop(t){
 if(paused){requestAnimationFrame(loop);return}
 dt=(t-last)/1000; last=t;
 update(dt); render();
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ===== WORLD GENERATION =====
const WORLD=4000;
let buildings=[],roads=[];
for(let x=-WORLD;x<WORLD;x+=200){
 for(let y=-WORLD;y<WORLD;y+=200){
  if(Math.random()<0.3){
   buildings.push({x,y,w:120,h:120});
  }else roads.push({x,y,w:200,h:200});
 }
}

// ===== ENTITY SYSTEM =====
class Entity{
 constructor(x,y){this.x=x;this.y=y;this.vx=0;this.vy=0;this.health=100;}
 update(){}
 draw(){}
}
let entities=[];

// ===== PLAYER =====
class Player extends Entity{
 constructor(){super(0,0);this.speed=200;this.money=1000;this.weapon=0;this.ammo=[100,200,40];this.reload=0;this.stars=0;}
 update(){
  let s=this.speed*(keys["shift"]?1.7:1);
  if(keys["w"])this.vy=-s;
  else if(keys["s"])this.vy=s; else this.vy*=0.8;
  if(keys["a"])this.vx=-s;
  else if(keys["d"])this.vx=s; else this.vx*=0.8;
  this.x+=this.vx*dt; this.y+=this.vy*dt;
  if(keys["1"])this.weapon=0;
  if(keys["2"])this.weapon=1;
  if(keys["3"])this.weapon=2;
  if(mouse.down && this.reload<=0) shoot(this);
  if(this.reload>0)this.reload-=dt;
 }
 draw(){
  ctx.fillStyle="lime";
  ctx.fillRect(this.x-10,this.y-10,20,20);
 }
}
let player=new Player(); entities.push(player);

// ===== BULLET POOL =====
let bullets=[];
for(let i=0;i<200;i++)bullets.push({x:0,y:0,vx:0,vy:0,life:0});
function shoot(p){
 let b=bullets.find(b=>b.life<=0); if(!b) return;
 let ang=Math.atan2(mouse.y-canvas.height/2,mouse.x-canvas.width/2);
 let spread=[0.1,0.2,0.4][p.weapon];
 ang+= (Math.random()-0.5)*spread;
 b.x=p.x; b.y=p.y;
 b.vx=Math.cos(ang)*800; b.vy=Math.sin(ang)*800;
 b.life=1.5;
 p.reload=[0.4,0.1,0.8][p.weapon];
}
function updateBullets(){
 bullets.forEach(b=>{
  if(b.life>0){
   b.life-=dt;
   b.x+=b.vx*dt; b.y+=b.vy*dt;
  }
 });
}

// ===== AI CIVILIANS =====
class Civilian extends Entity{
 constructor(x,y){super(x,y);this.dir=Math.random()*6.28}
 update(){
  this.vx+=Math.cos(this.dir)*10;
  this.vy+=Math.sin(this.dir)*10;
  this.x+=this.vx*dt; this.y+=this.vy*dt;
  if(Math.random()<0.01)this.dir=Math.random()*6.28;
 }
 draw(){ctx.fillStyle="yellow";ctx.fillRect(this.x-6,this.y-6,12,12);}
}
for(let i=0;i<50;i++)entities.push(new Civilian(Math.random()*2000-1000,Math.random()*2000-1000));

// ===== VEHICLES =====
class Car extends Entity{
 constructor(x,y){super(x,y);this.angle=0;this.speed=0;this.driver=null;this.health=100;}
 update(){
  if(this.driver===player){
   if(keys["w"])this.speed+=300*dt;
   if(keys["s"])this.speed-=300*dt;
   this.speed*=0.98;
   if(keys["a"])this.angle-=2*dt;
   if(keys["d"])this.angle+=2*dt;
   this.x+=Math.cos(this.angle)*this.speed*dt;
   this.y+=Math.sin(this.angle)*this.speed*dt;
   if(keys["e"])this.driver=null;
  }
 }
 draw(){
  ctx.save();
  ctx.translate(this.x,this.y);
  ctx.rotate(this.angle);
  ctx.fillStyle="red";
  ctx.fillRect(-20,-10,40,20);
  ctx.restore();
 }
}
let cars=[];
for(let i=0;i<10;i++){let c=new Car(Math.random()*2000-1000,Math.random()*2000-1000);entities.push(c);cars.push(c)}

// ===== MISSIONS =====
let mission=0;
const missions=[
 "Reach $2000",
 "Survive 60s",
 "Drive car",
 "Eliminate 10 civilians",
 "Reach wanted level 3"
];

// ===== DAY NIGHT =====
let time=0;
function sky(){
 let t=(Math.sin(time*0.05)+1)/2;
 ctx.fillStyle=`rgba(0,0,30,${0.7-t*0.7})`;
 ctx.fillRect(-9999,-9999,20000,20000);
}

// ===== UPDATE =====
function update(){
 time+=dt;
 entities.forEach(e=>e.update());
 updateBullets();
 document.getElementById("ui").innerHTML=
 `HP:${player.health} $${player.money}<br>Weapon:${player.weapon+1}<br>Mission:${missions[mission]}`;
}

// ===== CAMERA =====
function render(){
 ctx.save();
 ctx.translate(canvas.width/2-player.x,canvas.height/2-player.y);
 ctx.fillStyle="#222";
 ctx.fillRect(-WORLD,-WORLD,WORLD*2,WORLD*2);

 ctx.fillStyle="#333";
 roads.forEach(r=>ctx.fillRect(r.x,r.y,r.w,r.h));
 ctx.fillStyle="#555";
 buildings.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));

 entities.forEach(e=>e.draw());
 ctx.fillStyle="white";
 bullets.forEach(b=>{if(b.life>0)ctx.fillRect(b.x,b.y,3,3)});
 sky();
 ctx.restore();

 // minimap
 mini.fillStyle="#000"; mini.fillRect(0,0,160,160);
 mini.fillStyle="#0f0";
 mini.fillRect(80+player.x/50,80+player.y/50,4,4);
}

// ===== SAVE / LOAD =====
setInterval(()=>{
 localStorage.save=JSON.stringify({x:player.x,y:player.y,money:player.money})
},5000);
if(localStorage.save){
 let s=JSON.parse(localStorage.save);
 player.x=s.x;player.y=s.y;player.money=s.money;
}

// ===== PAUSE =====
onkeydown=e=>{ if(e.key==="Escape"){paused=!paused;document.getElementById("pause").style.display=paused?"block":"none"} keys[e.key.toLowerCase()]=true;}
</script>
</body>
</html>
