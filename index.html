<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Founder of Tea - Premium Assam Tea Direct from Gardens</title>
    <meta name="description" content="Premium hand-picked Assam tea supplied directly from authentic tea gardens by Founder Surendra Jajra. Bulk & retail supply across India.">
    <meta name="keywords" content="Assam tea, premium tea, bulk tea supply, orthodox tea, Surendra Jajra">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-green: #0f3d2e;
            --tea-gold: #c8a951;
            --cream-white: #f7f4ee;
            --white: #ffffff;
            --text-dark: #2d2d2d;
            --text-light: #666;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            color: var(--text-dark);
            overflow-x: hidden;
            background: var(--cream-white);
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }

        /* Founder Badge - Top Right Corner */
        .founder-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            background: linear-gradient(135deg, var(--tea-gold), #d4b373);
            color: var(--dark-green);
            padding: 1rem 1.5rem;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(200,169,81,0.4);
            text-align: center;
            font-weight: 600;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            animation: founderFloat 3s ease-in-out infinite;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .founder-badge:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(200,169,81,0.5);
        }

        @keyframes founderFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15, 61, 46, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 1rem 0;
            transition: all 0.3s ease;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--tea-gold);
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        .nav-link {
            color: var(--cream-white);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-link:hover {
            color: var(--tea-gold);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: var(--tea-gold);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 4px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: var(--cream-white);
            transition: 0.3s;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(15, 61, 46, 0.7), rgba(15, 61, 46, 0.7)), 
                        url('https://images.unsplash.com/photo-1576091160399-1d65c2792e1b?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--cream-white);
            position: relative;
        }

        .hero-content {
            max-width: 900px;
            padding: 0 2rem;
            animation: fadeInUp 1.2s ease;
        }

        .hero h1 {
            font-size: clamp(3.5rem, 8vw, 6.5rem);
            margin-bottom: 1.5rem;
            letter-spacing: 0.03em;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .hero p {
            font-size: 1.4rem;
            margin-bottom: 3rem;
            opacity: 0.95;
            font-weight: 300;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .cta-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1.2rem 2.8rem;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--tea-gold), #d4b373);
            color: var(--dark-green);
            box-shadow: 0 8px 25px rgba(200,169,81,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(200,169,81,0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--cream-white);
            border: 2px solid rgba(247,244,238,0.8);
        }

        .btn-secondary:hover {
            background: var(--cream-white);
            color: var(--dark-green);
            transform: translateY(-4px);
        }

        /* Sections */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .section {
            padding: 140px 0;
        }

        .section-title {
            text-align: center;
            font-size: clamp(2.8rem, 6vw, 4.5rem);
            margin-bottom: 5rem;
            color: var(--dark-green);
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, var(--tea-gold), transparent);
            border-radius: 2px;
        }

        /* Why Choose Us */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 3.5rem;
            margin-top: 6rem;
        }

        .feature-card {
            text-align: center;
            padding: 4rem 2.5rem;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.08);
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid rgba(255,255,255,0.4);
            position: relative;
            overflow: hidden;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--tea-gold), transparent);
        }

        .feature-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 35px 80px rgba(0,0,0,0.15);
        }

        .feature-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--tea-gold), #d4b373);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2.5rem;
            font-size: 2.2rem;
            color: var(--dark-green);
            box-shadow: 0 10px 30px rgba(200,169,81,0.3);
        }

        /* Products */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 3rem;
            margin-top: 6rem;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-20px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
        }

        .product-image {
            height: 280px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }

        .product-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(15,61,46,0.4), rgba(200,169,81,0.3));
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .product-card:hover .product-image::before {
            opacity: 1;
        }

        .product-content {
            padding: 3rem;
        }

        .product-title {
            font-size: 1.8rem;
            margin-bottom: 1.2rem;
            color: var(--dark-green);
        }

        /* Founder Section */
        .founder-section {
            background: linear-gradient(135deg, rgba(15,61,46,0.06), rgba(200,169,81,0.06));
            text-align: center;
            padding: 160px 0;
        }

        .founder-portrait {
            width: 320px;
            height: 320px;
            background: linear-gradient(135deg, var(--tea-gold), #d4b373);
            border-radius: 50%;
            margin: 0 auto 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            color: var(--dark-green);
            box-shadow: 0 30px 80px rgba(200,169,81,0.4);
            position: relative;
        }

        .founder-portrait::before {
            content: 'SJ';
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 3.5rem;
        }

        .founder-story {
            max-width: 900px;
            margin: 0 auto;
            font-size: 1.2rem;
            line-height: 1.9;
        }

        /* Testimonials */
        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            margin-top: 6rem;
        }

        .testimonial {
            background: rgba(255,255,255,0.95);
            padding: 3rem;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.08);
            text-align: center;
            border-left: 5px solid var(--tea-gold);
            position: relative;
        }

        .testimonial::before {
            content: '"';
            position: absolute;
            top: -10px;
            left: 30px;
            font-size: 6rem;
            color: var(--tea-gold);
            font-family: serif;
            line-height: 1;
        }

        /* CTA Banner */
        .cta-banner {
            background: linear-gradient(135deg, var(--dark-green), #1a5a45);
            color: var(--cream-white);
            text-align: center;
            padding: 5rem 2rem;
            margin: 6rem 0;
            border-radius: 30px;
            box-shadow: 0 25px 80px rgba(15,61,46,0.3);
        }

        .cta-banner h2 {
            font-size: 3rem;
            margin-bottom: 1.5rem;
        }

        /* Contact Form */
        .contact-form {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            padding: 4rem;
            border-radius: 25px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 600;
            color: var(--dark-green);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 1.2rem;
            border: 2px solid rgba(15,61,46,0.1);
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.8);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--tea-gold);
            box-shadow: 0 0 0 4px rgba(200,169,81,0.1);
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 3rem;
            margin: 5rem 0;
            text-align: center;
        }

        .stat-item h3 {
            font-size: 3.5rem;
            color: var(--tea-gold);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        /* Footer */
        .footer {
            background: var(--dark-green);
            color: var(--cream-white);
            padding: 5rem 0 2rem;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 3rem;
            margin-bottom: 3rem;
        }

        .footer h3 {
            color: var(--tea-gold);
            margin-bottom: 1.5rem;
        }

        .social-links {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .social-links a {
            width: 55px;
            height: 55px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--cream-white);
            text-decoration: none;
            transition: all 0.4s ease;
            font-size: 1.3rem;
        }

        .social-links a:hover {
            background: var(--tea-gold);
            transform: translateY(-5px) scale(1.1);
        }

        .footer-bottom {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
